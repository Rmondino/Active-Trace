version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activia_trace
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/activia_trace"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-at-least-32-chars}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-change-me-32-chars-exact-length}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-15}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m app.workers.main
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/activia_trace"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-at-least-32-chars}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-change-me-32-chars-exact-length}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
